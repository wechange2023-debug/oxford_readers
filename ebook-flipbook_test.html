<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

html,body{width:100%;height:100%;overflow:hidden;}

body{
  /* FlipHTML5 특유의 어두운 무대 배경 */
  background: #2a2a2a;
  background-image:
    radial-gradient(ellipse at 50% 0%, #3a3a3a 0%, #1a1a1a 70%);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  font-family:'Noto Sans KR',sans-serif;
  gap:0;
  position:relative;
}

/* 무대 반사광 */
body::after{
  content:'';position:fixed;
  bottom:0;left:0;right:0;height:35%;
  background:linear-gradient(to top,rgba(0,0,0,0.45),transparent);
  pointer-events:none;z-index:0;
}

/* ── 상단 타이틀 ── */
.ui-top{
  position:relative;z-index:20;
  margin-bottom:16px;
  display:flex;align-items:center;gap:12px;
}
.ui-logo{
  font-family:'Playfair Display',serif;
  font-size:11px;letter-spacing:5px;
  color:rgba(255,255,255,0.45);
  text-transform:uppercase;
}

/* ── 책 컨테이너 ── */
#book-container{
  position:relative;z-index:10;
  /* 그림자는 stf__parent에서 */
}

.stf__parent{
  border-radius:2px;
  box-shadow:
    0 70px 120px rgba(0,0,0,0.75),
    0 30px 60px rgba(0,0,0,0.55),
    0 8px 20px rgba(0,0,0,0.4) !important;
}

/* 책 바닥 반사 (FlipHTML5 시그니처) */
#book-reflection{
  position:relative;z-index:9;
  transform:scaleY(-1);
  transform-origin:top center;
  mask-image:linear-gradient(to bottom,rgba(0,0,0,0.18) 0%,transparent 55%);
  -webkit-mask-image:linear-gradient(to bottom,rgba(0,0,0,0.18) 0%,transparent 55%);
  pointer-events:none;
  overflow:hidden;
}

/* ── 각 페이지 ── */
.page{
  width:100%;height:100%;
  background:#111;
  overflow:hidden;
  display:flex;flex-direction:column;
  font-family:'Noto Sans KR',sans-serif;
  -webkit-user-select:none;user-select:none;
  position:absolute;
}

/* ── 속지: 풀스크린 미디어 영역 ── */
.inner-page{
  width:100%;height:100%;
  position:relative;
  background:#0a0a0a;
  overflow:hidden;
}

/* 꽉 찬 이미지 */
.inner-page img.page-img{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;
  display:block;
}

/* 꽉 찬 영상 */
.inner-page video.page-vid{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;
  display:none;
}
.inner-page video.page-vid.active{ display:block; }

/* iframe (영상 URL 임베드) */
.inner-page iframe.page-frame{
  position:absolute;inset:0;
  width:100%;height:100%;
  border:none;display:none;
  background:#000;
}
.inner-page iframe.page-frame.active{ display:block; }

/* 빈 상태 플레이스홀더 */
.page-placeholder{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:14px;
  background:linear-gradient(160deg,#0e0c0a,#1e1408,#0e0c0a);
  z-index:3;
  transition:opacity .3s;
}
.page-placeholder.hidden{ opacity:0;pointer-events:none; }
.page-placeholder::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(45deg,
    transparent 0,transparent 18px,
    rgba(232,133,74,.018) 18px,rgba(232,133,74,.018) 36px);
}
.ph-icon{
  width:54px;height:54px;border-radius:50%;
  border:1.5px solid rgba(232,133,74,.45);
  background:rgba(232,133,74,.08);
  display:flex;align-items:center;justify-content:center;
  position:relative;z-index:1;
}
.ph-icon svg{ width:22px;height:22px;fill:rgba(232,133,74,.8); }
.ph-text{
  font-size:10px;color:rgba(255,255,255,.4);
  letter-spacing:2px;text-transform:uppercase;
  position:relative;z-index:1;text-align:center;line-height:1.6;
}

/* 페이지 번호 오버레이 */
.page-num-badge{
  position:absolute;bottom:10px;
  font-size:10px;color:rgba(255,255,255,0.35);
  font-family:'Playfair Display',serif;letter-spacing:2px;
  z-index:10;pointer-events:none;
  text-shadow:0 1px 4px rgba(0,0,0,0.8);
}
.page-num-badge.L{ left:14px; }
.page-num-badge.R{ right:14px; }

/* 미디어 입력 패널 (클릭하면 나타남) */
.media-panel{
  position:absolute;inset:0;z-index:20;
  display:none;
  flex-direction:column;align-items:center;justify-content:center;gap:12px;
  background:rgba(0,0,0,0.82);
  backdrop-filter:blur(6px);
}
.media-panel.open{ display:flex; }
.mp-title{
  font-size:12px;color:rgba(255,255,255,.7);
  letter-spacing:2px;margin-bottom:4px;
}
.mp-row{
  display:flex;gap:10px;align-items:center;
  width:86%;
}
.mp-input{
  flex:1;padding:8px 12px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.18);
  border-radius:6px;color:#fff;font-size:11px;
  outline:none;
  placeholder-color:rgba(255,255,255,.3);
}
.mp-input::placeholder{ color:rgba(255,255,255,.3); }
.mp-btn{
  padding:8px 14px;border-radius:6px;border:none;cursor:pointer;
  font-size:11px;font-weight:700;letter-spacing:1px;
  transition:all .18s;
}
.mp-btn.apply{
  background:#e8854a;color:#fff;
}
.mp-btn.apply:hover{ background:#d0703a; }
.mp-btn.cancel{
  background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);
}
.mp-btn.cancel:hover{ background:rgba(255,255,255,.18); }
.mp-divider{
  display:flex;align-items:center;gap:10px;width:86%;
  color:rgba(255,255,255,.25);font-size:10px;
}
.mp-divider::before,.mp-divider::after{
  content:'';flex:1;height:1px;background:rgba(255,255,255,.12);
}
/* 파일 업로드 버튼 */
.mp-file-label{
  display:flex;align-items:center;gap:8px;
  padding:8px 18px;border-radius:6px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.15);
  color:rgba(255,255,255,.6);font-size:11px;cursor:pointer;
  transition:all .18s;
}
.mp-file-label:hover{ background:rgba(255,255,255,.15);color:#fff; }
.mp-file-label input{ display:none; }

/* 편집 버튼 (이미지/영상 올린 후 우상단에 작게) */
.page-edit-btn{
  position:absolute;top:8px;right:8px;z-index:15;
  width:28px;height:28px;border-radius:50%;
  background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.2);
  color:rgba(255,255,255,0.6);font-size:13px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .18s;
  opacity:0;
}
.inner-page:hover .page-edit-btn{ opacity:1; }
.page-edit-btn:hover{ background:rgba(0,0,0,0.75);color:#fff; }

/* 표지 */
.cover-page{
  width:100%;height:100%;
  background:linear-gradient(152deg,#c87a38 0%,#7a3208 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:13px;
  position:relative;overflow:hidden;
}
.cover-page::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(circle at 22% 18%,rgba(255,195,110,.15) 0%,transparent 52%),
    radial-gradient(circle at 82% 88%,rgba(40,8,0,.22) 0%,transparent 48%);
}
.cover-page::after{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(-40deg,transparent 0,transparent 24px,rgba(255,255,255,.014) 24px,rgba(255,255,255,.014) 48px);
}
.cov-badge{font-size:7px;letter-spacing:4px;color:rgba(255,255,255,.5);text-transform:uppercase;position:relative;z-index:1;}
.cov-line{width:42px;height:1px;background:rgba(255,255,255,.28);position:relative;z-index:1;}
.cov-title{font-family:'Playfair Display',serif;font-size:28px;color:#fff;text-align:center;line-height:1.22;text-shadow:0 3px 16px rgba(0,0,0,.28);position:relative;z-index:1;}
.cov-sub{font-size:10px;color:rgba(255,255,255,.68);letter-spacing:2.5px;position:relative;z-index:1;}
.cov-level{background:rgba(255,255,255,.11);border:1px solid rgba(255,255,255,.26);padding:5px 15px;border-radius:13px;font-size:8px;color:rgba(255,255,255,.85);letter-spacing:2px;position:relative;z-index:1;}

/* 목차 */
.toc-inner{padding:24px 20px;height:100%;position:relative;background:#fffdf8;}
.toc-h{font-family:'Playfair Display',serif;font-size:16px;color:#2a1f14;margin-bottom:5px;}
.toc-bar{width:30px;height:2px;background:#e8854a;margin-bottom:15px;}
.toc-row{display:flex;align-items:center;gap:7px;padding:7px 0;border-bottom:.8px dashed #ddd0c0;}
.toc-row-n{font-family:'Playfair Display',serif;font-size:9.5px;color:#e8854a;min-width:14px;}
.toc-row-t{font-size:10.5px;color:#2a1f14;flex:1;}
.toc-row-p{font-size:9.5px;color:#b0a090;font-family:'Playfair Display',serif;}
.pg-num{position:absolute;bottom:11px;font-size:9px;color:#c0a888;font-family:'Playfair Display',serif;letter-spacing:1.5px;}
.pg-num.L{left:16px;}.pg-num.R{right:16px;}

/* 뒷표지 */
.back-cover{
  width:100%;height:100%;
  background:linear-gradient(152deg,#7a3208,#2a0e02);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
}
.back-cover .bt{font-family:'Playfair Display',serif;font-size:20px;color:#e8c49a;text-align:center;}
.back-cover .bl{width:40px;height:1px;background:rgba(232,133,74,.35);}
.back-cover .bu{font-size:9.5px;color:rgba(232,180,130,.35);letter-spacing:2px;text-align:center;}

/* ── 하단 UI (FlipHTML5 스타일 — 어두운 툴바) ── */
.ui-bottom{
  position:relative;z-index:20;
  margin-top:18px;
  display:flex;align-items:center;gap:0;
  background:rgba(0,0,0,0.55);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:28px;
  padding:5px 8px;
  backdrop-filter:blur(8px);
}
.nav-btn{
  width:36px;height:36px;border-radius:50%;
  background:transparent;border:none;
  color:rgba(255,255,255,0.65);font-size:1.3rem;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .18s;
}
.nav-btn:hover:not(:disabled){color:#fff;background:rgba(255,255,255,0.1);}
.nav-btn:disabled{opacity:.2;cursor:default;}
.nav-info{
  font-size:11px;color:rgba(255,255,255,0.5);
  letter-spacing:1.5px;min-width:80px;text-align:center;
}

/* 페이지 카운터 도트 */
.nav-dots{
  display:flex;gap:5px;align-items:center;padding:0 6px;
}
.nav-dot{
  width:9px;height:9px;border-radius:50%;
  background:rgba(255,255,255,0.2);
  transition:all .2s;cursor:pointer;
}
.nav-dot.active{background:rgba(255,255,255,0.75);transform:scale(1.3);}

.upload-hint{
  position:relative;z-index:20;
  margin-top:8px;
  font-size:0.88rem;color:rgb(153 153 153 / 94%);
  letter-spacing:1px;text-align:center;
}

/* 전체화면 버튼 */
.btn-fullscreen{
  position:fixed;top:16px;right:16px;z-index:100;
  width:34px;height:34px;border-radius:8px;
  background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.12);
  color:rgba(255,255,255,0.55);font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;backdrop-filter:blur(4px);
}
.btn-fullscreen:hover{background:rgba(0,0,0,0.65);color:#fff;}

/* ── 세로 모드 차단 오버레이 ── */
#rotate-overlay{
  display:none;
  position:fixed;inset:0;z-index:9999;
  background:#1a1a1a;
  flex-direction:column;
  align-items:center;justify-content:center;gap:20px;
  color:#fff;text-align:center;
}
#rotate-overlay.show{ display:flex; }
.rotate-icon{
  font-size:52px;
  animation:rotateHint 1.4s ease-in-out infinite;
}
@keyframes rotateHint{
  0%,100%{ transform:rotate(0deg); }
  40%    { transform:rotate(-90deg); }
  60%    { transform:rotate(-90deg); }
}
.rotate-title{ font-size:17px;font-weight:700;letter-spacing:1px; }
.rotate-sub  { font-size:12px;color:rgba(255,255,255,0.5);letter-spacing:0.5px; }

/* ── 반응형 타이틀·툴바 ── */
@media(max-width:767px){
  .ui-logo{ font-size:9px;letter-spacing:3px; }
  .ui-top { margin-bottom:10px; }
  .ui-bottom{ padding:3px 6px; }
  .nav-btn{ width:30px;height:30px;font-size:14px; }
  .nav-info{ font-size:9px;min-width:64px; }
  .nav-dot{ width:4px;height:4px; }
  .upload-hint{ font-size:8px;margin-top:6px; }
  .btn-fullscreen{ width:28px;height:28px;font-size:12px;top:10px;right:10px; }
}
@media(min-width:768px) and (max-width:1023px){
  .ui-logo{ font-size:10px;letter-spacing:4px; }
  .nav-btn{ width:34px;height:34px;font-size:15px; }
  .nav-info{ font-size:10px; }
}
</style>
</head>
<body>

<!-- 세로 모드 차단 오버레이 -->
<div id="rotate-overlay">
  <div class="rotate-icon">📱</div>
  <div class="rotate-title">화면을 가로로 돌려주세요</div>
  <div class="rotate-sub">E-BOOK은 가로 모드에서 이용하실 수 있습니다</div>
</div>

<div class="ui-top">
  <div class="ui-logo">· E-BOOK VIEWER</div>
</div>

<div id="book-container"></div>

<div class="ui-bottom">
  <button class="nav-btn" id="btn-prev" onclick="goPage(-1)" title="이전">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path fill="rgb(255, 255, 255)" d="M201.4 297.4C188.9 309.9 188.9 330.2 201.4 342.7L361.4 502.7C373.9 515.2 394.2 515.2 406.7 502.7C419.2 490.2 419.2 469.9 406.7 457.4L269.3 320L406.6 182.6C419.1 170.1 419.1 149.8 406.6 137.3C394.1 124.8 373.8 124.8 361.3 137.3L201.3 297.3z"/></svg>
  </button>
  <div class="nav-dots" id="nav-dots"></div>
  <div class="nav-info" id="nav-info">표지</div>
  <button class="nav-btn" id="btn-next" onclick="goPage(1)" title="다음">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path fill="rgb(255, 255, 255)" d="M439.1 297.4C451.6 309.9 451.6 330.2 439.1 342.7L279.1 502.7C266.6 515.2 246.3 515.2 233.8 502.7C221.3 490.2 221.3 469.9 233.8 457.4L371.2 320L233.9 182.6C221.4 170.1 221.4 149.8 233.9 137.3C246.4 124.8 266.7 124.8 279.2 137.3L439.2 297.3z"/></svg>
  </button>
</div>
<div class="upload-hint">페이지 클릭 &nbsp;|&nbsp; 모서리 드래그 · ← → 키로 넘기기</div>

<button class="btn-fullscreen" onclick="toggleFullscreen()" title="전체화면">⛶</button>

<script>
/* ─── 크기 계산 ─── */
/* ─── 가로 세로 강제 전환 (모바일/태블릿) ─── */
function lockLandscape(){
  // Screen Orientation API
  const scr = window.screen;
  if(scr && scr.orientation && scr.orientation.lock){
    scr.orientation.lock('landscape').catch(()=>{});
  }
}

/* ─── 크기 계산 (2324:2681 비율, 반응형) ─── */
function calcSize(){
  const RATIO = 2681 / 2324;   // 높이/너비 ≈ 1.1536
  const vw = window.innerWidth;
  const vh = window.innerHeight;

  // UI 여백: 상단 타이틀 + 하단 툴바
  // 태블릿(768~1024): 여백 줄임
  // 모바일(~767): 더 줄임
  let uiH;
  if(vw >= 1024)      uiH = 160;   // 데스크탑
  else if(vw >= 768)  uiH = 130;   // 태블릿
  else                uiH = 110;   // 모바일 가로

  let pH = Math.min(vh - uiH, 680);
  let pW = Math.floor(pH / RATIO);

  // 2면 너비가 화면보다 크면 너비 기준으로 재계산
  const gap = vw >= 768 ? 30 : 16;
  if(pW * 2 + gap > vw){
    pW = Math.floor((vw - gap) / 2);
    pH = Math.floor(pW * RATIO);
  }

  // 최소 크기 보장
  pW = Math.max(pW, 140);
  pH = Math.max(pH, Math.floor(140 * RATIO));

  return { pW, pH };
}
const { pW: PW, pH: PH } = calcSize();

/* ─── 페이지 빌더 ─── */
function coverPage(){
  return `<div style="width:100%;height:100%;position:relative;overflow:hidden;background:#000;">
    <img src="https://wechange2023-debug.github.io/oxford_readers/1_1/1_1_Monster_School_cover_01.png"
         style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;">
  </div>`;
}
/* 속지: 풀스크린 미디어 페이지 */
function innerPage({id, num, side, defaultUrl=''}){
  const s         = side === 'L' ? 'L' : 'R';
  const isImg     = defaultUrl && /\.(jpe?g|png|gif|webp|avif|svg)(\?|$)/i.test(defaultUrl);
  const isVid     = defaultUrl && !isImg;
  const phHidden  = defaultUrl ? ' hidden' : '';
  const imgSrc    = isImg ? defaultUrl : '';
  const imgStyle  = isImg
    ? 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;z-index:1;'
    : 'display:none;';
  const vidSrc    = isVid ? `src="${defaultUrl}"` : '';
  const vidActive = isVid ? ' active' : '';
  return `<div class="inner-page" id="ip-${id}">
    <!-- 이미지 레이어 -->
    <img class="page-img" id="img-${id}"
         src="${imgSrc}" alt=""
         style="${imgStyle}">
    <!-- 영상 레이어 -->
    <video class="page-vid${vidActive}" id="vid-${id}"
           ${vidSrc} playsinline loop autoplay muted preload="auto"
           oncanplay="this.muted=true;this.play()"
           style="pointer-events:none;position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;"></video>
    <!-- iframe -->
    <iframe class="page-frame" id="frm-${id}"
            allowfullscreen allow="autoplay; encrypted-media"
            style="position:absolute;inset:0;width:100%;height:100%;border:none;display:none;z-index:1;"></iframe>

    <!-- 빈 상태 플레이스홀더 -->
    <div class="page-placeholder${phHidden}" id="ph-${id}" onclick="openPanel('${id}')">
      <div class="ph-icon">
        <svg viewBox="0 0 24 24"><path d="M19 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2zm-7 14l-4-5 3-3.5 2.5 3 3.5-4.5L21 17z" opacity=".4"/><circle cx="9" cy="9" r="2" opacity=".4"/><path d="M8 5v14l11-7z"/></svg>
      </div>
      <div class="ph-text">클릭하여 이미지 · 영상 업로드<br>또는 URL 입력</div>
    </div>

    <!-- 편집 버튼 -->
    <div class="page-edit-btn" onclick="openPanel('${id}')" title="미디어 변경" style="z-index:15;">✎</div>

    <!-- 미디어 입력 패널 -->
    <div class="media-panel" id="panel-${id}">
      <div class="mp-title">이미지 · 영상 URL 입력</div>
      <div class="mp-row">
        <input class="mp-input" id="url-${id}" type="text"
               placeholder="https://... (이미지 · MP4 · YouTube URL)"
               value="${defaultUrl}">
        <button class="mp-btn apply" onclick="applyUrl('${id}')">적용</button>
        <button class="mp-btn cancel" onclick="closePanel('${id}')">✕</button>
      </div>
      <div class="mp-divider">또는 파일 직접 업로드</div>
      <label class="mp-file-label">
        📁 파일 선택 (이미지 · MP4)
        <input type="file" accept="image/*,video/mp4,video/*"
               onchange="loadFile('${id}',this)">
      </label>
    </div>

    <!-- 페이지 번호 -->
    <div class="page-num-badge ${s}" style="z-index:20;">${num}</div>
  </div>`;
}
function backCover(){
  return `<div style="width:100%;height:100%;position:relative;overflow:hidden;background:#000;">
    <img src="https://wechange2023-debug.github.io/oxford_readers/1_1/1_1_Monster_School_cover_02.png"
         style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;">
  </div>`;
}

/* ─── 페이지 배열 (총 12장, 짝수 → 표지/뒷표지 단독 1면) ───
   표지(0,hard) / 속지1~10(soft) / 뒷표지(11,hard)
   속지는 모두 풀스크린 미디어 페이지
─────────────────────────────────────────────────── */
/* ─── 페이지별 기본 미디어 URL ───────────────────────
   각 페이지에 defaultUrl 지정 → 자동재생 + 무한반복
   나중에 다른 URL/파일로 변경 가능 (페이지 클릭 → 패널)
───────────────────────────────────────────────── */
const PAGES = [
  { density:'hard', html: coverPage() },                                                           // 0  앞표지 (단독 1면)
  { density:'soft', html: innerPage({id:'p02', num:'2', side:'L', defaultUrl:'https://wechange2023-debug.github.io/oxford_readers/1_1/1_1_Monster_School_0002_txt.mp4'}) }, // 1
  { density:'soft', html: innerPage({id:'p03', num:'3', side:'R', defaultUrl:'https://wechange2023-debug.github.io/oxford_readers/1_1/1_1_Monster_School_0003_txt.mp4'}) }, // 2
  { density:'soft', html: innerPage({id:'p04', num:'4', side:'L', defaultUrl:'https://wechange2023-debug.github.io/oxford_readers/1_1/1_1_Monster_School_0004_txt.mp4'}) }, // 3
  { density:'soft', html: innerPage({id:'p05', num:'5', side:'R', defaultUrl:'https://wechange2023-debug.github.io/oxford_readers/1_1/1_1_Monster_School_0005_txt.mp4'}) }, // 4
  { density:'soft', html: innerPage({id:'p06', num:'6', side:'L', defaultUrl:'https://wechange2023-debug.github.io/oxford_readers/1_1/1_1_Monster_School_0006_txt.mp4'}) }, // 5
  { density:'soft', html: innerPage({id:'p07', num:'7', side:'R', defaultUrl:'https://wechange2023-debug.github.io/oxford_readers/1_1/1_1_Monster_School_0007_txt.mp4'}) }, // 6
  { density:'soft', html: innerPage({id:'p08', num:'8', side:'L', defaultUrl:'https://wechange2023-debug.github.io/oxford_readers/1_1/1_1_Monster_School_0008_txt.mp4'}) }, // 7
  { density:'soft', html: innerPage({id:'p09', num:'9', side:'R', defaultUrl:'https://wechange2023-debug.github.io/oxford_readers/1_1/white_page_000.png'}) }, // 8
  { density:'hard', html: backCover() },                                                           // 9  뒷표지 (단독 1면, 짝수 총 10장)
];

const LAST = PAGES.length - 1; // 9

/* ─── 표지/뒷표지 단독 1면, 본문 2면 너비 전환 ─── */
function isSingle(idx){ return idx === 0 || idx === LAST; }

function setWidth(idx){
  const c = document.getElementById('book-container');
  c.style.width = (isSingle(idx) ? PW : PW*2) + 'px';
}

/* ─── DOM & PageFlip ─── */
let pageFlip;

function initFlip(){
  const c = document.getElementById('book-container');
  c.style.cssText = `width:${PW}px;height:${PH}px;position:relative;transition:width 0.25s ease;`;

  const pageEls = PAGES.map(({density,html}) => {
    const d = document.createElement('div');
    d.className = 'page';
    d.style.cssText = `width:${PW}px;height:${PH}px;`;
    if(density==='hard') d.dataset.density='hard';
    d.innerHTML = html;
    c.appendChild(d);
    return d;
  });

  pageFlip = new St.PageFlip(c, {
    width:PW, height:PH, size:'fixed',
    showCover:true, drawShadow:true,
    flippingTime:800,
    usePortrait:false,
    startZIndex:10, autoSize:false,
    maxShadowOpacity:0.55,
    mobileScrollSupport:false,
    swipeDistance:25,
    clickEventForward:true,
    useMouseEvents:true,
    showPageCorners:true,
    disableFlipByClick:false,
  });

  pageFlip.loadFromHTML(pageEls);

  pageFlip.on('flip', e => { setWidth(e.data); updateNav(e.data); });
  pageFlip.on('changeState', () => { const i=pageFlip.getCurrentPageIndex(); setWidth(i); updateNav(i); });

  buildDots();
  updateNav(0);

  /* 기본 미디어 URL을 mediaStore에 등록 → MutationObserver가 재렌더 */
  PAGES.forEach(p => {
    // 영상 src 등록
    const mv = p.html.match(/id="vid-([\w]+)"[^>]*src="([^"]+)"/);
    if(mv){ mediaStore[mv[1]] = {type:'vid', value:mv[2]}; }

    // 이미지 defaultUrl 등록 (innerPage의 data-default 속성으로 전달)
    const mi = p.html.match(/data-default="([^"]+\.(?:jpe?g|png|gif|webp|avif|svg)(?:\?[^"]*)?)"/i);
    if(mi){
      const id = p.html.match(/id="ip-([\w]+)"/)?.[1];
      if(id) mediaStore[id] = {type:'img', value:mi[1]};
    }
  });

  /* video 태그 자동재생 강제 실행 */
  setTimeout(() => {
    document.querySelectorAll('.page-vid.active').forEach(v => {
      v.muted = true;
      v.loop  = true;
      if(v.src) { v.load(); v.play().catch(()=>{}); }
    });
  }, 500);
}

/* ─── 내비 ─── */
const SPREAD_COUNT = Math.ceil((PAGES.length - 2) / 2) + 2; // 표지+뒷표지+내부스프레드

function buildDots(){
  const wrap = document.getElementById('nav-dots');
  // 스프레드 수만큼 도트: 표지, 내부 5쌍, 뒷표지
  const count = 6; // 표지 + 4스프레드 + 뒷표지
  for(let i=0;i<count;i++){
    const d=document.createElement('div');
    d.className='nav-dot'+(i===0?' active':'');
    d.dataset.idx=i;
    d.onclick=()=>jumpToSpread(i);
    wrap.appendChild(d);
  }
}

function jumpToSpread(spreadIdx){
  if(!pageFlip) return;
  // spread 0→page 0, spread 1→page 1, spread 2→page 3, ..., spread 6→page 10
  // spread: 0=표지, 1=p2-3, 2=p4-5, 3=p6-7, 4=p8-9, 5=뒷표지
  const map = [0, 1, 3, 5, 7, 9];
  pageFlip.turnToPage(Math.min(map[spreadIdx] ?? 0, LAST));
}

function updateNav(idx){
  document.getElementById('btn-prev').disabled = idx<=0;
  document.getElementById('btn-next').disabled = idx>=LAST;
  document.getElementById('nav-info').textContent =
    idx===0    ? '1 / ' + (LAST+1) + '(Cover)' :
    idx===LAST ? (LAST+1) + ' / ' + (LAST+1) + '(Cover)' :
    `${idx+1} / ${LAST+1} `;

  // 도트 업데이트
  const spreadIdx = idx===0?0 : idx===LAST?5 : Math.floor((idx)/2)+1;
  document.querySelectorAll('.nav-dot').forEach((d,i)=>{
    d.classList.toggle('active', i===spreadIdx);
  });
}

function goPage(dir){
  if(!pageFlip) return;
  dir===1 ? pageFlip.flipNext() : pageFlip.flipPrev();
}

/* ─── 키보드 ─── */
document.addEventListener('keydown', e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown') goPage(1);
  if(e.key==='ArrowLeft' ||e.key==='ArrowUp')   goPage(-1);
});

/* ─── 전체화면 ─── */
function toggleFullscreen(){
  if(!document.fullscreenElement) document.documentElement.requestFullscreen?.();
  else document.exitFullscreen?.();
}

/* ─── 미디어 패널 & 로더 ─── */
const mediaStore = {};  // { id: { type:'img'|'vid'|'url', value } }

function openPanel(id){
  document.getElementById('panel-'+id)?.classList.add('open');
}
function closePanel(id){
  document.getElementById('panel-'+id)?.classList.remove('open');
}

function applyUrl(id){
  const input = document.getElementById('url-'+id);
  const url = (input?.value || '').trim();
  if(!url) return;
  const isYT  = /youtu\.?be/.test(url);
  const isImg = /\.(jpe?g|png|gif|webp|avif|svg)(\?|$)/i.test(url);
  if(isYT){
    // YouTube → iframe embed
    const vid = url.match(/(?:v=|youtu\.be\/)([\w-]{11})/)?.[1];
    const embedUrl = vid
      ? `https://www.youtube.com/embed/${vid}?autoplay=1&loop=1&playlist=${vid}&controls=1&rel=0`
      : url;
    mediaStore[id] = {type:'frame', value: embedUrl};
  } else if(isImg){
    mediaStore[id] = {type:'img', value: url};
  } else {
    // MP4 직접 URL 또는 기타
    mediaStore[id] = {type:'vid', value: url};
  }
  renderMedia(id);
  closePanel(id);
}

function loadFile(id, input){
  const file = input.files[0]; if(!file) return;
  const url = URL.createObjectURL(file);
  const type = file.type.startsWith('video') ? 'vid' : 'img';
  mediaStore[id] = {type, value: url};
  renderMedia(id);
  closePanel(id);
}

function renderMedia(id){
  const m   = mediaStore[id]; if(!m) return;
  const img = document.getElementById('img-'+id);
  const vid = document.getElementById('vid-'+id);
  const frm = document.getElementById('frm-'+id);
  const ph  = document.getElementById('ph-'+id);

  // 모두 숨김
  if(img){ img.style.display='none'; }
  if(vid){ vid.classList.remove('active'); }
  if(frm){ frm.classList.remove('active'); }

  if(m.type === 'img' && img){
    img.src = m.value;
    img.style.display = 'block';
  } else if(m.type === 'vid' && vid){
    vid.src      = m.value;
    vid.muted    = true;
    vid.loop     = true;
    vid.autoplay = true;
    vid.setAttribute('playsinline','');
    vid.classList.add('active');
    vid.load();
    vid.play().catch(()=>{});
  } else if(m.type === 'frame' && frm){
    frm.src = m.value;
    frm.classList.add('active');
  }

  // 플레이스홀더 숨김
  if(ph) ph.classList.add('hidden');
}

/* 페이지 전환 후 미디어 복원 + 자동재생 */
new MutationObserver(()=>{
  Object.keys(mediaStore).forEach(id => renderMedia(id));
  // 복원된 video 재생
  setTimeout(() => {
    document.querySelectorAll('.page-vid.active').forEach(v => {
      v.muted = true; v.loop = true;
      if(v.src && v.paused) v.play().catch(()=>{});
    });
  }, 200);
}).observe(document.getElementById('book-container'),{childList:true,subtree:true});

/* ─── 세로 모드 감지 & 가로 강제 ─── */
function checkOrientation(){
  const overlay = document.getElementById('rotate-overlay');
  // 모바일/태블릿 (화면 너비 < 1024) 에서만 체크
  const isMobile = /Mobi|Android|iPad|iPhone|Tablet/i.test(navigator.userAgent)
                   || window.innerWidth < 1024;
  if(isMobile && window.innerHeight > window.innerWidth){
    overlay.classList.add('show');
  } else {
    overlay.classList.remove('show');
  }
}

window.addEventListener('orientationchange', ()=>{
  setTimeout(checkOrientation, 300);
});
window.addEventListener('resize', checkOrientation);

window.addEventListener('load', ()=>{
  lockLandscape();
  checkOrientation();
  initFlip();
});
</script>
</body>
</html>
